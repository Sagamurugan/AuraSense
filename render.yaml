services:
  - type: web
    name: aurasense-backend
    runtime: node
    plan: free
    rootDir: .
    buildCommand: npm install
    startCommand: npm run server
    autoDeploy: true
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: PORT
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: FRONTEND_ORIGIN
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: REGISTRATION_ENABLED
        value: true
      # Optional demo login for reviewers — set DEMO_AUTH_ENABLED=true in Render dashboard if needed
      - key: DEMO_AUTH_ENABLED
        value: false
